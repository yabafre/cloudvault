# APED Pipeline State
pipeline:
  current_phase: "ux"
  phases:
    analyze:
      status: "done"
      output: "docs/aped/product-brief.md"
    prd:
      status: "done"
      output: "docs/aped/prd.md"
    ux:
      status: "done"
      output: "docs/aped/ux/"
      preview: "docs/aped/ux-preview/"
      design_system:
        ui_library: "custom shadcn-style (Tailwind CSS 4)"
        tokens: "docs/aped/ux-preview/src/tokens/"
        style: "Vercel-inspired (black/white + emerald accent)"
      screens:
        - route: "/"
          file: "src/pages/Landing.tsx"
          layout: "standalone"
        - route: "/auth/login"
          file: "src/pages/Login.tsx"
          layout: "AuthLayout"
          frs: ["FR5", "FR6", "FR10"]
        - route: "/auth/register"
          file: "src/pages/Register.tsx"
          layout: "AuthLayout"
          frs: ["FR1", "FR2", "FR3", "FR4"]
        - route: "/auth/callback"
          file: "src/pages/AuthCallback.tsx"
          layout: "standalone"
          frs: ["FR2", "FR6", "FR7"]
        - route: "/dashboard"
          file: "src/pages/Dashboard.tsx"
          layout: "AppLayout"
          frs: ["FR13", "FR14", "FR15", "FR16", "FR19", "FR37", "FR38", "FR39", "FR40", "FR42"]
        - route: "/files"
          file: "src/pages/Files.tsx"
          layout: "AppLayout"
          frs: ["FR27", "FR28", "FR29", "FR30", "FR31", "FR32", "FR33"]
        - route: "/profile"
          file: "src/pages/Profile.tsx"
          layout: "AppLayout"
          frs: ["FR11", "FR12"]
        - route: "*"
          file: "src/pages/NotFound.tsx"
          layout: "standalone"

# Project context (generated by aped-context for brownfield projects)
project_context:
  generated: true
  path: "docs/aped/project-context.md"
  type: "brownfield"

# Sprint state (generated by aped-e, consumed by aped-d and aped-r)
sprint:
  project: ""
  stories: {}
