# APED Pipeline State
pipeline:
  current_phase: "sprint"
  phases:
    analyze:
      status: "done"
      output: "docs/aped/product-brief.md"
    prd:
      status: "done"
      output: "docs/aped/prd.md"
    ux:
      status: "done"
      output: "docs/aped/ux/"
      preview: "docs/aped/ux-preview/"
      design_system:
        ui_library: "custom shadcn-style (Tailwind CSS 4)"
        tokens: "docs/aped/ux-preview/src/tokens/"
        style: "Vercel-inspired (black/white + emerald accent)"
      screens:
        - route: "/"
          file: "src/pages/Landing.tsx"
          layout: "standalone"
        - route: "/auth/login"
          file: "src/pages/Login.tsx"
          layout: "AuthLayout"
          frs: ["FR5", "FR6", "FR10"]
        - route: "/auth/register"
          file: "src/pages/Register.tsx"
          layout: "AuthLayout"
          frs: ["FR1", "FR2", "FR3", "FR4"]
        - route: "/auth/callback"
          file: "src/pages/AuthCallback.tsx"
          layout: "standalone"
          frs: ["FR2", "FR6", "FR7"]
        - route: "/dashboard"
          file: "src/pages/Dashboard.tsx"
          layout: "AppLayout"
          frs: ["FR13", "FR14", "FR15", "FR16", "FR19", "FR37", "FR38", "FR39", "FR40", "FR42"]
        - route: "/files"
          file: "src/pages/Files.tsx"
          layout: "AppLayout"
          frs: ["FR27", "FR28", "FR29", "FR30", "FR31", "FR32", "FR33"]
        - route: "/profile"
          file: "src/pages/Profile.tsx"
          layout: "AppLayout"
          frs: ["FR11", "FR12"]
        - route: "*"
          file: "src/pages/NotFound.tsx"
          layout: "standalone"
    architecture:
      status: "done"
      output: "docs/aped/architecture.md"
    epics:
      status: "done"
      output: "docs/aped/epics.md"
      epic_count: 6
      story_count: 35
      fr_coverage: "46/46"
      ticket_sync: linear
      stack:
        backend: "NestJS 11 + Prisma 7.7.0 + PostgreSQL (Neon EU)"
        frontend: "Next.js 16 App Router + React 19 + Tailwind CSS 4 + shadcn/ui"
        rpc: "oRPC (contract-first, OpenAPI 3.0)"
        server_actions: "zapaction (Next.js-only actions: cookies, redirects)"
        forms: "@tanstack/react-form + @tanstack/react-form-nextjs"
        state: "Zustand 5 (auth) + TanStack Query (server state via oRPC)"
        storage: "AWS S3 eu-west-3 (SSE-S3, pre-signed POST)"
        thumbnails: "AWS Lambda Python (Pillow) + S3 trigger"
        hosting_web: "Vercel EU"
        hosting_api: "AWS Fargate eu-west-3"
        cdn_waf: "Cloudflare"
        iac: "AWS CDK (TypeScript)"
        ci_cd: "GitHub Actions + OIDC"
        monitoring: "Sentry + CloudWatch + Better Stack Logs"
      packages:
        - "@cloudvault/types"
        - "@cloudvault/validators"
        - "@cloudvault/zod"
        - "@cloudvault/contract"
        - "@cloudvault/eslint-config"
        - "@cloudvault/typescript-config"

# Project context (generated by aped-context for brownfield projects)
project_context:
  generated: true
  path: "docs/aped/project-context.md"
  type: "brownfield"

