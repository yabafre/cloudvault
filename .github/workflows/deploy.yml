name: Deploy

# Gated by CI: runs only after the CI workflow succeeds on main, or via
# manual dispatch FROM main. workflow_run only fires from the host repo
# (never forks). workflow_dispatch is restricted to the main ref at the
# job-level `if:` guard below — selecting a feature branch in the UI will
# skip every job.
on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # The three deploy-* jobs intentionally omit `needs:` so they run in parallel
  # once the `production` environment approval unlocks. `needs: []` would be
  # equivalent but actionlint rejects the empty list as a syntax error.
  deploy-infra:
    name: Deploy infra (CDK) — stub
    # Allow success-only workflow_run on main, or manual dispatch FROM main.
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-infra-prod
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-3

      # TODO: wire in story KON-88 (1-7 AWS CDK stacks) — replace stub with `pnpm --filter infra cdk deploy --all --require-approval never`
      - name: CDK deploy (stub)
        run: |
          echo "TODO cdk deploy — wired in KON-88 (story 1-7)"

  deploy-api:
    name: Deploy API (Fargate) — stub
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-api-prod
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-3

      # TODO: wire in a future epic-1 Fargate deploy story (ticket TBD — tracked under Epic 1 roadmap, see docs/aped/epics.md).
      # Steps will build the Docker image, push to ECR (eu-west-3), and update the ECS service.
      - name: Fargate deploy (stub)
        run: |
          echo "TODO Fargate deploy — wired in future epic-1 API deploy story (ticket TBD)"

  deploy-lambda:
    name: Deploy Lambda (thumbnail-generator) — stub
    if: >-
      (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    environment: production
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: deploy-lambda-prod
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@5579c002bb4778aa43395ef1df492868a9a1c83f # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-west-3

      # TODO: wire in story KON-109 (4-5 Thumbnail Lambda refactor) — package Python, `aws lambda update-function-code`.
      - name: Lambda deploy (stub)
        run: |
          echo "TODO lambda deploy — wired in KON-109 (story 4-5)"
