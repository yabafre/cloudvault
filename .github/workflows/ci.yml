name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# Cancel stale PR runs; never cancel in-flight main-branch runs so every
# merged commit gets a full coverage artifact and a clean workflow_run signal
# for the deploy workflow.
concurrency:
  group: >-
    ${{ github.event_name == 'pull_request'
        && format('ci-pr-{0}', github.event.pull_request.number)
        || format('ci-main-{0}', github.sha) }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Lint, test, build
    runs-on: ubuntu-latest
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Fail fast on workflow syntax errors BEFORE burning compute on install/lint/test/build.
      - name: Lint workflows with actionlint
        uses: rhysd/actionlint@4e683ab8014a63fafa117492a0c6053758e6d593 # v1.7.3

      - name: Setup monorepo
        uses: ./.github/actions/setup-monorepo

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: coverage
          path: |
            apps/*/coverage
            packages/*/coverage
          retention-days: 14
          if-no-files-found: ignore
