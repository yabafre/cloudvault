# workmux config for CloudVault APED parallel sprint
# Docs: https://workmux.raine.dev/

panes:
  - command: claude --dangerously-skip-permissions
    focus: true

# Gitignored files must be copied — tracked files already land via git checkout.
# `.claude/` and `.aped/` are fully copied because both are gitignored in this
# project; without them the worktree's Claude session fails on the first prompt
# (UserPromptSubmit hook → `.aped/hooks/guardrail.sh`).
files:
  copy:
    - .env*
    - .mcp.json
    - .claude/
    - .aped/
  symlink:
    - node_modules

post_create:
  - pnpm install --frozen-lockfile || pnpm install
